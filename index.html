<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 세계 날씨 비교</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273548;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --hot: #f97316;
      --warm: #facc15;
      --cool: #60a5fa;
      --cold: #818cf8;
    }
    .light {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #e8f0f7;
      --border: #cbd5e1;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #0284c7;
      --accent-glow: rgba(2, 132, 199, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }
    .logo span { color: var(--text); }

    .search-box {
      flex: 1;
      min-width: 220px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-box .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }
    .autocomplete {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      z-index: 2000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .autocomplete-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .autocomplete-item:hover { background: var(--surface2); }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .view-toggle .btn {
      border-radius: 0;
      border: none;
      border-right: 1px solid var(--border);
      padding: 8px 16px;
    }
    .view-toggle .btn:last-child { border-right: none; }

    /* ── Sort bar ── */
    .sort-bar {
      max-width: 1400px;
      margin: 20px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .sort-label { font-size: 0.8rem; color: var(--text-muted); }

    /* ── Grid ── */
    .grid-wrap {
      max-width: 1400px;
      margin: 16px auto 40px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* ── Map ── */
    #map-wrap {
      display: none;
      height: calc(100vh - 140px);
      min-height: 500px;
      margin: 16px 24px 0;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    #map { width: 100%; height: 100%; }

    /* Leaflet popup 커스텀 */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 16px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content {
      margin: 0 !important;
      width: auto !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-close-button {
      color: var(--text-muted) !important;
      font-size: 1.2rem !important;
      top: 10px !important;
      right: 12px !important;
    }

    .popup-inner {
      padding: 18px 20px;
      min-width: 200px;
    }
    .popup-city { font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; }
    .popup-country { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 12px; }
    .popup-main { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .popup-icon { font-size: 2.4rem; line-height: 1; }
    .popup-temp { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    .popup-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
    .popup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .popup-meta {
      background: var(--surface2);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.75rem;
    }
    .popup-meta-label { color: var(--text-muted); margin-bottom: 2px; }
    .popup-meta-value { font-weight: 600; font-size: 0.85rem; }

    /* 날씨 마커 */
    .weather-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    .weather-marker-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 3px 10px rgba(0,0,0,0.35);
      border: 2px solid rgba(255,255,255,0.25);
      transition: transform 0.15s;
      line-height: 1;
      color: #fff;
    }
    .weather-marker-badge:hover { transform: scale(1.1); }
    .weather-marker-badge .m-icon { font-size: 1rem; }
    .weather-marker-tail {
      width: 2px;
      height: 8px;
      background: rgba(255,255,255,0.5);
      border-radius: 2px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 20px 78px;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.25); }

    .card-remove {
      position: absolute;
      top: 12px; right: 12px;
      width: 24px; height: 24px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
    }
    .card:hover .card-remove { opacity: 1; }
    .card-remove:hover { background: #ef444422; color: #ef4444; }

    .card-city { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }
    .card-country { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
    .card-localtime {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }
    .card-weather-icon { font-size: 2.8rem; line-height: 1; margin-bottom: 8px; }
    .card-temp {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 2px;
    }
    .card-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 14px; }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .meta-item {
      background: var(--surface2);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.75rem;
    }
    .meta-label { color: var(--text-muted); margin-bottom: 2px; }
    .meta-value { font-weight: 600; font-size: 0.85rem; }

    .temp-hot  { color: var(--hot); }
    .temp-warm { color: var(--warm); }
    .temp-cool { color: var(--cool); }
    .temp-cold { color: var(--cold); }

    .card-bar {
      margin-top: 12px;
      height: 4px;
      border-radius: 4px;
      background: var(--border);
      overflow: hidden;
    }
    .card-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s ease;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .card-skeleton .sk-title  { height: 18px; width: 60%; margin-bottom: 6px; }
    .card-skeleton .sk-sub    { height: 12px; width: 40%; margin-bottom: 20px; }
    .card-skeleton .sk-icon   { height: 48px; width: 48px; border-radius: 50%; margin-bottom: 10px; }
    .card-skeleton .sk-temp   { height: 36px; width: 80px; margin-bottom: 8px; }
    .card-skeleton .sk-desc   { height: 12px; width: 55%; margin-bottom: 16px; }
    .card-skeleton .sk-meta   { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .card-skeleton .sk-meta > div { height: 52px; border-radius: 10px; }

    .error-msg { color: #f87171; font-size: 0.8rem; margin-top: 8px; }

    /* ── Compare ── */
    .card-compare-btn {
      position: absolute; bottom: 8px; left: 12px;
      padding: 5px 10px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text-muted); font-size: 0.72rem; cursor: pointer;
      opacity: 1; transition: opacity 0.2s, background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .card-compare-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; opacity: 1; }
    .card.comparing { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    #compareBar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 24px; display: none;
      align-items: center; gap: 12px; flex-wrap: wrap;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    .compare-bar-label { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; }
    .compare-bar-cities { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
    .compare-bar-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 4px 12px; font-size: 0.82rem;
    }
    .compare-bar-chip button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 0; line-height: 1; }
    .compare-bar-chip button:hover { color: #ef4444; }
    .compare-bar-actions { display: flex; gap: 8px; }
    #compareModal {
      display: none; position: fixed; inset: 0; z-index: 1500;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .compare-modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; width: 100%; max-width: 920px;
      max-height: 90vh; overflow-y: auto; padding: 28px;
      animation: fadeIn 0.25s ease;
    }
    .compare-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .compare-modal-title { font-size: 1.2rem; font-weight: 700; }
    .compare-modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
    .compare-modal-close:hover { color: var(--text); }
    .compare-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .compare-table th, .compare-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
    .compare-table th { color: var(--text-muted); font-weight: 600; font-size: 0.8rem; }
    .compare-table td:first-child { text-align: left; color: var(--text-muted); font-size: 0.8rem; white-space: nowrap; }
    .compare-table th.city-col { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .cmp-mascot svg { height: 54px; width: auto; display: block; margin: 0 auto 4px; }
    .cmp-win-hot  { color: var(--hot);  font-weight: 800; }
    .cmp-win-cold { color: var(--cold); font-weight: 800; }
    .cmp-win-best { color: var(--accent); font-weight: 800; }

    /* ── Mascot ── */
    .mascot {
      position: absolute;
      bottom: 4px;
      right: 8px;
      height: 72px;
      width: auto;
      pointer-events: none;
      filter: drop-shadow(1px 2px 5px rgba(0,0,0,0.18));
    }
    .mascot svg { height: 72px; width: auto; display: block; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
    .last-updated {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 8px 24px 0;
    }

    @media (max-width: 600px) {
      .grid-wrap { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
      .card { padding: 16px; }
      .card-temp { font-size: 1.8rem; }
      #map-wrap { margin: 12px 12px 0; border-radius: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">🌍 <span>세계 날씨</span></div>

    <div class="search-box" id="searchWrap">
      <span class="icon">🔍</span>
      <input id="searchInput" type="text" placeholder="도시 검색 후 추가..." autocomplete="off" />
      <div class="autocomplete" id="autocomplete" style="display:none"></div>
    </div>

    <div class="controls">
      <!-- 뷰 전환 -->
      <div class="view-toggle">
        <button class="btn active" id="viewGrid" onclick="setView('grid')" title="카드 그리드">⊞ 카드</button>
        <button class="btn"        id="viewMap"  onclick="setView('map')"  title="세계 지도">🗺 지도</button>
      </div>
      <!-- 단위 -->
      <button class="btn active" id="btnC" onclick="setUnit('C')">°C</button>
      <button class="btn"        id="btnF" onclick="setUnit('F')">°F</button>
      <!-- 테마 -->
      <button class="btn" id="themeBtn" onclick="toggleTheme()">☀️ 라이트</button>
    </div>
  </div>
</header>

<div class="sort-bar" id="sortBar">
  <span class="sort-label">정렬:</span>
  <button class="btn active" id="sort-default"   onclick="setSort('default')">기본</button>
  <button class="btn"        id="sort-temp-desc" onclick="setSort('temp-desc')">🔥 높은 온도</button>
  <button class="btn"        id="sort-temp-asc"  onclick="setSort('temp-asc')">❄️ 낮은 온도</button>
  <button class="btn"        id="sort-name"      onclick="setSort('name')">가나다순</button>
</div>

<div class="last-updated" id="lastUpdated"></div>

<!-- 카드 그리드 -->
<div class="grid-wrap" id="grid"></div>

<!-- 지도 -->
<div id="map-wrap">
  <div id="map"></div>
</div>

<!-- 비교 바 -->
<div id="compareBar">
  <span class="compare-bar-label">비교 선택:</span>
  <div class="compare-bar-cities" id="compareChips"></div>
  <div class="compare-bar-actions">
    <button class="btn" onclick="clearCompare()">초기화</button>
    <button class="btn active" id="compareBtn" onclick="openCompareModal()">📊 비교하기</button>
  </div>
</div>

<!-- 비교 모달 -->
<div id="compareModal" onclick="if(event.target===this)closeCompareModal()">
  <div class="compare-modal-box">
    <div class="compare-modal-header">
      <div class="compare-modal-title">📊 도시 날씨 비교</div>
      <button class="compare-modal-close" onclick="closeCompareModal()">✕</button>
    </div>
    <div id="compareModalBody"></div>
  </div>
</div>

<footer>
  데이터: <a href="https://open-meteo.com" target="_blank" style="color:var(--accent)">Open-Meteo</a> (무료 오픈소스 날씨 API) &nbsp;·&nbsp; 지도: <a href="https://leafletjs.com" target="_blank" style="color:var(--accent)">Leaflet</a> + <a href="https://carto.com/attribution" target="_blank" style="color:var(--accent)">CARTO</a> &nbsp;·&nbsp; 자동 새로고침: 10분
</footer>

<script>

/* ─────────────── WMO 날씨 코드 ─────────────── */
function wmoInfo(code) {
  const map = {
    0:  { icon: '☀️',  desc: '맑음' },
    1:  { icon: '🌤️', desc: '대체로 맑음' },

/* ─────────────── 온도 색상 ─────────────── */
function tempClass(c) {
  if (c >= 30) return 'temp-hot';
  if (c >= 15) return 'temp-warm';
  if (c >= 5)  return 'temp-cool';
  return 'temp-cold';
}
function tempBarColor(c) {
  if (c >= 30) return '#f97316';
  if (c >= 15) return '#facc15';
  if (c >= 5)  return '#60a5fa';
  return '#818cf8';
}
function tempBarWidth(c) {
  const pct = Math.min(100, Math.max(0, ((c + 20) / 70) * 100));
  return pct.toFixed(1) + '%';
}

/* ─────────────── 상태 ─────────────── */
let unit  = 'C';
let sort  = 'default';
let theme = 'dark';
let view  = 'grid';
let cities = [...DEFAULT_CITIES];

function toDisplay(c) {
  return unit === 'C' ? Math.round(c) + '°C' : Math.round(c * 9/5 + 32) + '°F';
}

/* ─────────────── API 호출 ─────────────── */
async function fetchWeather(city) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature&timezone=auto&wind_speed_unit=ms`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error('API 오류');
  const json = await res.json();
  const cur  = json.current;
  return {
    temp:        cur.temperature_2m,
    feelsLike:   cur.apparent_temperature,
    weatherCode: cur.weathercode,
    wind:        cur.windspeed_10m,
    humidity:    cur.relativehumidity_2m,
    timezone:    json.timezone,
  };
}

async function loadAll() {
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    `마지막 업데이트: ${now.toLocaleTimeString('ko-KR')}`;

  renderAll();

  await Promise.allSettled(
    cities.map(async (city, i) => {
      try {
        city.data  = await fetchWeather(city);
        city.error = null;
      } catch {
        city.error = '데이터를 불러올 수 없습니다';
        city.data  = null;
      }
      renderCard(i);
      updateMarker(i);
    })
  );

  const now2 = new Date();
  document.getElementById('lastUpdated').textContent =
    `마지막 업데이트: ${now2.toLocaleTimeString('ko-KR')}`;
}

};

/* ─────────────── 카드 렌더링 ─────────────── */
function sortedIndices() {
  const idx = cities.map((_, i) => i);
  if (sort === 'default')    return idx;
  if (sort === 'name')       return idx.sort((a,b) => cities[a].name.localeCompare(cities[b].name, 'ko'));
  if (sort === 'temp-desc')  return idx.sort((a,b) => (cities[b].data?.temp ?? -999) - (cities[a].data?.temp ?? -999));
  if (sort === 'temp-asc')   return idx.sort((a,b) => (cities[a].data?.temp ?? 999)  - (cities[b].data?.temp ?? 999));
  return idx;
}

function renderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  sortedIndices().forEach(i => {
    const el = document.createElement('div');
    el.id = `card-${i}`;
    grid.appendChild(el);
    renderCard(i, el);
  });
  if (view === 'map') refreshAllMarkers();
}

function renderCard(i, el) {
  el = el || document.getElementById(`card-${i}`);
  if (!el) return;
  const city = cities[i];

  if (!city.data && !city.error) {
    el.className = 'card card-skeleton';
    el.innerHTML = `
      <div class="sk-title skeleton"></div>
      <div class="sk-sub skeleton"></div>
      <div class="sk-icon skeleton"></div>
      <div class="sk-temp skeleton"></div>
      <div class="sk-desc skeleton"></div>
      <div class="sk-meta">
        <div class="skeleton"></div><div class="skeleton"></div>
        <div class="skeleton"></div><div class="skeleton"></div>
      </div>`;
    return;
  }

  el.className = compareList.includes(i) ? 'card comparing' : 'card';

  if (city.error) {
    const mascotErr = MASCOTS[city.name] ?? '';
    const tzErr = city.tz || '';
    const timeErr = tzErr
      ? new Date().toLocaleTimeString('ko-KR', { timeZone: tzErr, hour: '2-digit', minute: '2-digit' })
      : '';
    el.innerHTML = `
      <button class="card-remove" onclick="removeCity(${i})" title="제거">✕</button>
      <div class="card-city">${city.name}</div>
      <div class="card-country">${city.country}</div>
      ${timeErr ? `<div class="card-localtime" data-tz="${tzErr}">🕐 ${timeErr}</div>` : ''}
      <div class="error-msg">⚠️ ${city.error}</div>
      <div class="mascot">${mascotErr}</div>`;
    return;
  }

  const d      = city.data;
  const info   = wmoInfo(d.weatherCode);
  const tc     = tempClass(d.temp);
  const barW   = tempBarWidth(d.temp);
  const barC   = tempBarColor(d.temp);
  const mascot = MASCOTS[city.name] ?? '';
  const tz = d.timezone || city.tz || '';
  const localTime = tz
    ? new Date().toLocaleTimeString('ko-KR', { timeZone: tz, hour: '2-digit', minute: '2-digit' })
    : '';

  el.innerHTML = `
    <button class="card-remove" onclick="removeCity(${i})" title="제거">✕</button>
    <div class="card-city">${city.name}</div>
    <div class="card-country">${city.country}</div>
    ${localTime ? `<div class="card-localtime" data-tz="${d.timezone}">🕐 ${localTime}</div>` : ''}
    <div class="card-weather-icon">${info.icon}</div>
    <div class="card-temp ${tc}">${toDisplay(d.temp)}</div>
    <div class="card-desc">${info.desc}</div>
    <div class="card-meta">
      <div class="meta-item">
        <div class="meta-label">체감온도</div>
        <div class="meta-value">${toDisplay(d.feelsLike)}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">습도</div>
        <div class="meta-value">${d.humidity}%</div>
      </div>
      <div class="meta-item" style="grid-column:1/-1">
        <div class="meta-label">풍속</div>
        <div class="meta-value">${d.wind} m/s</div>
      </div>
    </div>
    <div class="card-bar">
      <div class="card-bar-fill" style="width:${barW};background:${barC}"></div>
    </div>
    <button class="card-compare-btn ${compareList.includes(i) ? 'active' : ''}" onclick="toggleCompare(${i})">${compareList.includes(i) ? '✓ 비교 중' : '+ 비교'}</button>
    <div class="mascot">${mascot}</div>`;
}

/* ─────────────── 도시 제거 ─────────────── */
function removeCity(i) {
  if (cityMarkers[i]) { map.removeLayer(cityMarkers[i]); cityMarkers[i] = null; }
  compareList = compareList.filter(ci => ci !== i).map(ci => ci > i ? ci - 1 : ci);
  cities.splice(i, 1);
  cityMarkers.splice(i, 1);
  updateCompareBar();
  renderAll();
}

/* ─────────────── 단위 & 테마 ─────────────── */
function setUnit(u) {
  unit = u;
  document.getElementById('btnC').classList.toggle('active', u === 'C');
  document.getElementById('btnF').classList.toggle('active', u === 'F');
  renderAll();
}

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.body.classList.toggle('light', theme === 'light');
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️ 라이트' : '🌙 다크';
  // 지도 타일 교체
  if (map) {
    tileLayerDark.remove();
    tileLayerLight.remove();
    if (theme === 'dark') tileLayerDark.addTo(map);
    else                  tileLayerLight.addTo(map);
  }
}

/* ─────────────── 정렬 ─────────────── */
function setSort(s) {
  sort = s;
  document.querySelectorAll('.sort-bar .btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + s)?.classList.add('active');
  renderAll();
}

/* ─────────────── 뷰 전환 ─────────────── */
function setView(v) {
  view = v;
  document.getElementById('viewGrid').classList.toggle('active', v === 'grid');
  document.getElementById('viewMap').classList.toggle('active',  v === 'map');
  document.getElementById('sortBar').style.display   = v === 'grid' ? '' : 'none';
  document.getElementById('grid').style.display      = v === 'grid' ? '' : 'none';
  document.getElementById('map-wrap').style.display  = v === 'map'  ? 'block' : 'none';

  if (v === 'map') {
    // map이 숨겨진 상태에서 생성됐을 경우 크기 재계산
    setTimeout(() => {
      map.invalidateSize();
      refreshAllMarkers();
    }, 50);
  }
}

/* ────────────────────────────────────────────
   지도 (Leaflet)
──────────────────────────────────────────── */
let map, tileLayerDark, tileLayerLight;
let cityMarkers = [];

function initMap() {
  map = L.map('map', {
    center: [20, 10],
    zoom: 2,
    minZoom: 1,
    maxZoom: 10,
    zoomControl: true,
  });

  // 다크 타일
  tileLayerDark = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    { attribution: '&copy; <a href="https://carto.com/attribution">CARTO</a>', subdomains: 'abcd', maxZoom: 19 }
  );
  // 라이트 타일
  tileLayerLight = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { attribution: '&copy; <a href="https://carto.com/attribution">CARTO</a>', subdomains: 'abcd', maxZoom: 19 }
  );

  tileLayerDark.addTo(map); // 기본: 다크

  // 초기 마커 (로딩 중 상태)
  cities.forEach((_, i) => { cityMarkers.push(null); addMarker(i); });
}

/* 마커 HTML 생성 */
function markerHTML(city) {
  if (!city.data) {
    return `<div class="weather-marker">
      <div class="weather-marker-badge" style="background:#475569">⏳</div>
      <div class="weather-marker-tail"></div>
    </div>`;
  }
  const info  = wmoInfo(city.data.weatherCode);
  const color = tempBarColor(city.data.temp);
  const temp  = toDisplay(city.data.temp);
  return `<div class="weather-marker">
    <div class="weather-marker-badge" style="background:${color}">
      <span class="m-icon">${info.icon}</span> ${temp}
    </div>
    <div class="weather-marker-tail"></div>
  </div>`;
}

/* 팝업 HTML 생성 */
function popupHTML(city) {
  if (!city.data) return `<div class="popup-inner"><div class="popup-city">${city.name}</div><div style="color:#94a3b8;font-size:0.85rem;margin-top:8px">로딩 중...</div></div>`;
  const d    = city.data;
  const info = wmoInfo(d.weatherCode);
  const tc   = tempClass(d.temp);
  return `
  <div class="popup-inner">
    <div class="popup-city">${city.name}</div>
    <div class="popup-country">${city.country}</div>
    <div class="popup-main">
      <div class="popup-icon">${info.icon}</div>
      <div>
        <div class="popup-temp ${tc}">${toDisplay(d.temp)}</div>
        <div class="popup-desc">${info.desc}</div>
      </div>
    </div>
    <div class="popup-grid">
      <div class="popup-meta">
        <div class="popup-meta-label">체감온도</div>
        <div class="popup-meta-value">${toDisplay(d.feelsLike)}</div>
      </div>
      <div class="popup-meta">
        <div class="popup-meta-label">습도</div>
        <div class="popup-meta-value">${d.humidity}%</div>
      </div>
      <div class="popup-meta" style="grid-column:1/-1">
        <div class="popup-meta-label">풍속</div>
        <div class="popup-meta-value">${d.wind} m/s</div>
      </div>
    </div>
  </div>`;
}

function addMarker(i) {
  const city = cities[i];
  const icon = L.divIcon({
    className: '',
    html: markerHTML(city),
    iconAnchor: [0, 38],
    popupAnchor: [28, -38],
  });

  const marker = L.marker([city.lat, city.lon], { icon })
    .addTo(map)
    .bindPopup(popupHTML(city), { maxWidth: 260, className: 'weather-popup' });

  cityMarkers[i] = marker;
}

function updateMarker(i) {
  if (!map) return;
  const city   = cities[i];
  const marker = cityMarkers[i];
  if (!marker) { addMarker(i); return; }

  // 아이콘 갱신
  marker.setIcon(L.divIcon({
    className: '',
    html: markerHTML(city),
    iconAnchor: [0, 38],
    popupAnchor: [28, -38],
  }));
  // 팝업 갱신
  marker.setPopupContent(popupHTML(city));
}

function refreshAllMarkers() {
  cities.forEach((_, i) => {
    if (cityMarkers[i]) {
      updateMarker(i);
    } else {
      addMarker(i);
    }
  });
}

/* ─────────────── 도시 검색 (Open-Meteo Geocoding) ─────────────── */
let searchTimer;
const searchInput  = document.getElementById('searchInput');
const autocomplete = document.getElementById('autocomplete');
let geoResults = [];

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { autocomplete.style.display = 'none'; return; }
  searchTimer = setTimeout(() => geocodeSearch(q), 300);
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { autocomplete.style.display = 'none'; searchInput.value = ''; }
});
document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) autocomplete.style.display = 'none';
});

async function geocodeSearch(q) {
  try {
    const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=ko`);
    const json = await res.json();
    geoResults = json.results || [];
    if (!geoResults.length) { autocomplete.style.display = 'none'; return; }
    autocomplete.innerHTML = geoResults.map((r, i) => `
      <div class="autocomplete-item" onclick="addCityFromGeo(${i})">
        📍 ${r.name} &nbsp;<span style="color:var(--text-muted);font-size:0.8em">${r.country ?? ''} ${r.admin1 ?? ''}</span>
      </div>`).join('');
    autocomplete.style.display = 'block';
  } catch { autocomplete.style.display = 'none'; }
}

async function addCityFromGeo(i) {
  const r = geoResults[i];
  if (!r) return;
  autocomplete.style.display = 'none';
  searchInput.value = '';

  const newCity = { name: r.name, country: r.country ?? '', lat: r.latitude, lon: r.longitude, data: null, error: null };
  const idx = cities.length;
  cities.push(newCity);
  cityMarkers.push(null);

  renderAll();
  if (map && newCity.lat && newCity.lon) {
    try {
      addMarker(idx);
      map.flyTo([newCity.lat, newCity.lon], 5, { duration: 1.2 });
    } catch(e) {
      console.warn('map error:', e.message);
    }
  }

  // 새 카드(스켈레톤)로 스크롤
  const newEl = document.getElementById(`card-${idx}`);
  if (newEl) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

  try {
    newCity.data = await fetchWeather(newCity);
  } catch {
    newCity.error = '데이터를 불러올 수 없습니다';
  }
  renderCard(idx);
  updateMarker(idx);

  // 완성된 카드로 다시 스크롤 + 하이라이트
  const doneEl = document.getElementById(`card-${idx}`);
  if (doneEl) {
    doneEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    doneEl.style.transition = 'box-shadow 0.3s';
    doneEl.style.boxShadow = '0 0 0 3px var(--accent)';
    setTimeout(() => { doneEl.style.boxShadow = ''; }, 1500);
  }
}

/* ─────────────── 비교 기능 ─────────────── */
let compareList = [];

function toggleCompare(i) {
  const idx = compareList.indexOf(i);
  if (idx === -1) {
    if (compareList.length >= 4) { alert('최대 4개 도시까지 비교할 수 있습니다.'); return; }
    compareList.push(i);
  } else {
    compareList.splice(idx, 1);
  }
  renderCard(i);
  updateCompareBar();
}

function updateCompareBar() {
  const bar   = document.getElementById('compareBar');
  const chips = document.getElementById('compareChips');
  if (compareList.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  chips.innerHTML = compareList.map(i => {
    const c = cities[i];
    return `<span class="compare-bar-chip">${c.name} <button onclick="toggleCompare(${i})" title="제거">✕</button></span>`;
  }).join('');
  document.getElementById('compareBtn').textContent = `📊 비교하기 (${compareList.length})`;
}

function clearCompare() {
  const prev = [...compareList];
  compareList = [];
  prev.forEach(i => renderCard(i));
  updateCompareBar();
}

function openCompareModal() {
  if (compareList.length < 2) { alert('2개 이상 도시를 선택해주세요.'); return; }
  document.getElementById('compareModalBody').innerHTML = buildCompareTable();
  document.getElementById('compareModal').style.display = 'flex';
}

function closeCompareModal() {
  document.getElementById('compareModal').style.display = 'none';
}

function buildCompareTable() {
  const list = compareList.map(i => ({ i, city: cities[i] })).filter(x => x.city.data);
  if (!list.length) return '<p style="color:var(--text-muted);padding:20px 0">날씨 데이터가 아직 없습니다. 잠시 후 다시 시도해주세요.</p>';

  const maxTemp    = Math.max(...list.map(x => x.city.data.temp));
  const minTemp    = Math.min(...list.map(x => x.city.data.temp));
  const minHumid   = Math.min(...list.map(x => x.city.data.humidity));
  const minWind    = Math.min(...list.map(x => x.city.data.wind));

  const header = `<tr>
    <th style="min-width:80px"></th>
    ${list.map(x => `<th class="city-col">
      <div class="cmp-mascot">${MASCOTS[x.city.name] ?? ''}</div>
      ${x.city.name}<br>
      <span style="font-weight:400;font-size:0.75rem;color:var(--text-muted)">${x.city.country}</span>
    </th>`).join('')}
  </tr>`;

  const rows = [
    { label: '🕐 현지 시간', fn: x => {
        const tz = (x.city.data.timezone || x.city.tz || '');
        return tz ? new Date().toLocaleTimeString('ko-KR', { timeZone: tz, hour: '2-digit', minute: '2-digit' }) : '—';
    }},
    { label: '🌤 날씨', fn: x => {
        const info = wmoInfo(x.city.data.weatherCode);
        return `${info.icon} ${info.desc}`;
    }},
    { label: '🌡 기온', fn: x => {
        const cls = x.city.data.temp === maxTemp ? 'cmp-win-hot' : x.city.data.temp === minTemp ? 'cmp-win-cold' : '';
        return `<span class="${cls}">${toDisplay(x.city.data.temp)}</span>`;
    }},
    { label: '체감온도', fn: x => toDisplay(x.city.data.feelsLike) },
    { label: '💧 습도', fn: x => {
        const cls = x.city.data.humidity === minHumid ? 'cmp-win-best' : '';
        return `<span class="${cls}">${x.city.data.humidity}%</span>`;
    }},
    { label: '💨 풍속', fn: x => {
        const cls = x.city.data.wind === minWind ? 'cmp-win-best' : '';
        return `<span class="${cls}">${x.city.data.wind} m/s</span>`;
    }},
  ];

  const bodyRows = rows.map(r =>
    `<tr><td>${r.label}</td>${list.map(x => `<td>${r.fn(x)}</td>`).join('')}</tr>`
  ).join('');

  return `<div style="overflow-x:auto">
    <table class="compare-table">
      <thead>${header}</thead>
      <tbody>${bodyRows}</tbody>
    </table>
  </div>
  <p style="font-size:0.75rem;color:var(--text-muted);margin-top:14px">
    <span class="cmp-win-hot">■</span> 최고 기온 &nbsp;
    <span class="cmp-win-cold">■</span> 최저 기온 &nbsp;
    <span class="cmp-win-best">■</span> 최적값(낮을수록 쾌적)
  </p>`;
}

/* ─────────────── 현지 시간 업데이트 (1분마다) ─────────────── */
setInterval(() => {
  document.querySelectorAll('.card-localtime[data-tz]').forEach(el => {
    const tz = el.dataset.tz;
    if (!tz) return;
    const t = new Date().toLocaleTimeString('ko-KR', { timeZone: tz, hour: '2-digit', minute: '2-digit' });
    el.textContent = '🕐 ' + t;
  });
}, 60 * 1000);

/* ─────────────── 자동 새로고침 ─────────────── */
setInterval(loadAll, 10 * 60 * 1000);

/* ─────────────── 초기화 ─────────────── */
initMap();
loadAll();
</script>
